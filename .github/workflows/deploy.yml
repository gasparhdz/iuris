name: Deploy production

# Deploy MANUAL: pushear a main NO despliega. Para desplegar:
# GitHub → Actions → "Deploy production" → Run workflow.
on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "Host iuris-vps
            HostName 200.58.103.155
            User root
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            UserKnownHostsFile ~/.ssh/known_hosts" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy backend dist
        run: |
          ssh iuris-vps "rm -rf /var/www/iuris/backend/dist.new"
          rsync -az --delete -e ssh \
            backend/dist/ iuris-vps:/var/www/iuris/backend/dist.new/
          ssh iuris-vps \
            "rm -rf /var/www/iuris/backend/dist && mv /var/www/iuris/backend/dist.new /var/www/iuris/backend/dist && chown -R iuris:iuris /var/www/iuris/backend/dist"

      - name: Pull, install deps and migrate on VPS
        run: |
          ssh iuris-vps \
            "cd /var/www/iuris && sudo -u iuris git pull --ff-only && cd backend && sudo -u iuris npm install --no-audit --no-fund && sudo -u iuris node scripts/apply-pending-migrations.cjs"

      - name: Restart backend service
        run: |
          ssh iuris-vps \
            "systemctl restart iuris-backend && sleep 3 && systemctl is-active iuris-backend"

      - name: Deploy frontend dist
        run: |
          ssh iuris-vps "rm -rf /var/www/iuris/frontend/dist.new"
          rsync -az --delete -e ssh \
            frontend/dist/ iuris-vps:/var/www/iuris/frontend/dist.new/
          ssh iuris-vps \
            "rm -rf /var/www/iuris/frontend/dist && mv /var/www/iuris/frontend/dist.new /var/www/iuris/frontend/dist && chown -R iuris:iuris /var/www/iuris/frontend/dist && chmod -R a+rX /var/www/iuris/frontend/dist"

      - name: Verify production
        run: |
          set -e
          FRONT_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://iurispro.com.ar/)
          if [ "$FRONT_CODE" != "200" ]; then
            echo "Frontend check failed: expected 200, got ${FRONT_CODE}"
            exit 1
          fi
          echo "Frontend OK (200)"

          API_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://iurispro.com.ar/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{}")
          if [ "$API_CODE" != "400" ]; then
            echo "API check failed: expected 400, got ${API_CODE}"
            exit 1
          fi
          echo "API OK (400 validation)"
